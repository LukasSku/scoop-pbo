name: Auto Update PBO Hash

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-hash:
    runs-on: ubuntu-latest # Nutzt jetzt das viel schnellere Linux
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch current remote hash
        id: get_hash
        run: |
          # Lädt die Datei ultraschnell per curl und berechnet direkt den SHA256-Hash
          URL="https://pbo-downloads.s3.eu-central-003.backblazeb2.com/pbo-windows.zip"
          HASH=$(curl -sL "$URL" | sha256sum | awk '{print $1}')
          echo "NEW_HASH=$HASH" >> $GITHUB_ENV

      - name: Update JSON Manifest
        run: |
          JSON_PATH="bucket/pbo.json"
          # Liest den aktuellen Hash aus der JSON aus
          OLD_HASH=$(jq -r '.hash' $JSON_PATH)
          
          if [ "$OLD_HASH" != "$NEW_HASH" ]; then
            # Ersetzt den alten Hash in der Datei mithilfe von jq
            jq --arg env_hash "$NEW_HASH" '.hash = $env_hash' $JSON_PATH > tmp.json && mv tmp.json $JSON_PATH
            echo "CHANGED=true" >> $GITHUB_ENV
          else
            echo "CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Commit and Push changes
        if: ${{ env.CHANGED == 'true' }}
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add bucket/pbo.json
          git commit -m "Chore: Automatisch aktualisierter SHA-256 Hash"
          git push
